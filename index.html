<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ХАТА ЕБЫЛЯ</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            min-height: 100vh;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: white;
            font-weight: 600;
            font-size: 2.5rem;
            margin-top: 50px;
            text-align: center;
        }

        .button-container {
            margin-bottom: 50px;
        }

        button {
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 40px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: background-color 0.3s;
            box-shadow: 0 4px 8px rgba(255,255,255,0.1);
        }

        button:hover {
            background-color: #45a049;
        }
        
        .back-button {
            background-color: #f44336;
        }
        
        .back-button:hover {
            background-color: #d32f2f;
        }
        
        .virus-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }
        
        .virus-btn {
            background-color: #ff9800;
            padding: 12px 10px;
            font-size: 14px;
            word-break: break-word;
        }
        
        .virus-btn:hover {
            background-color: #f57c00;
        }
    </style>
</head>
<body>
    <!-- Главная страница -->
    <div id="mainPage" style="display: flex; flex-direction: column; justify-content: space-between; align-items: center; min-height: 100vh; width: 100%;">
        <h1>Зайти в хату ебыля?</h1>
        
        <div class="button-container">
            <button onclick="goToHata()">ЗАЙТИ</button>
        </div>
    </div>

    <!-- Страница Хата -->
    <div id="hataPage" style="display: none; width: 100%;">
        <h1>Хата</h1>
        
        <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; width: 100%; align-items: center;">
            <button onclick="goToViruses()" style="margin: 20px; width: 80%; max-width: 300px;">Вирусы ебыля</button>
        </div>

        <div class="button-container">
            <button class="back-button" onclick="goToMain()">Назад</button>
        </div>
    </div>

    <!-- Страница с вирусами -->
    <div id="virusesPage" style="display: none; width: 100%;">
        <h1>Ебыль</h1>
        
        <div class="virus-grid">
            <button class="virus-btn" onclick="downloadVirus('ebyl1')">Ебыль часть 1</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl2')">Ебыль часть 2</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl3')">Ебыль часть 3</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl4')">Ебыль часть 4</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl5')">Ебыль часть 5</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl6')">Ебыль часть 6</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl7')">Ебыль часть 7</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl8')">Ебыль часть 8</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl9')">Ебыль часть 9</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl10')">Ебыль часть 10</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl11')">Ебыль часть 11</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl12')">Ебыль часть 12</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl13')">Ебыль часть 13</button>
            <button class="virus-btn" onclick="downloadVirus('ebyl14')">Ебыль часть 14</button>
            <button class="virus-btn" onclick="downloadVirus('ebyllock')">ЕбыльLOCK</button>
            <button class="virus-btn" onclick="downloadVirus('callebylandhisbellyfree')">call Ебыль and his belly free 2025</button>
            <button class="virus-btn" onclick="downloadVirus('myhorrorebyl1')">My horror ЕБЫЛЬ</button>
            <button class="virus-btn" onclick="downloadVirus('myhorrorebyl2')">My horror ЕБЫЛЬ 2</button>
        </div>

        <div class="button-container" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="back-button" onclick="goToHataFromViruses()">Назад в хату</button>
            <button class="back-button" onclick="goToMain()">На главную</button>
        </div>
    </div>

    <script>
        function goToHata() {
            document.getElementById('mainPage').style.display = 'none';
            document.getElementById('hataPage').style.display = 'flex';
            document.getElementById('hataPage').style.flexDirection = 'column';
            document.getElementById('hataPage').style.minHeight = '100vh';
        }
        
        function goToMain() {
            document.getElementById('hataPage').style.display = 'none';
            document.getElementById('virusesPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'flex';
            document.getElementById('mainPage').style.flexDirection = 'column';
            document.getElementById('mainPage').style.minHeight = '100vh';
        }
        
        function goToViruses() {
            document.getElementById('hataPage').style.display = 'none';
            document.getElementById('virusesPage').style.display = 'flex';
            document.getElementById('virusesPage').style.flexDirection = 'column';
            document.getElementById('virusesPage').style.minHeight = '100vh';
        }
        
        function goToHataFromViruses() {
            document.getElementById('virusesPage').style.display = 'none';
            document.getElementById('hataPage').style.display = 'flex';
            document.getElementById('hataPage').style.flexDirection = 'column';
            document.getElementById('hataPage').style.minHeight = '100vh';
        }
        
        function downloadVirus(filename) {
            var link = document.createElement('a');
            link.href = filename + '.apk';
            link.download = filename + '.apk';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            alert('Скачивание ' + filename + '.apk начато...');
        }
    </script>
</body>
</html>
